wantType:
  metadata:
    name: gmail_list_unread
    title: Gmail Unread Important
    description: |
      Fetches unread important emails from Gmail via the list-unread-gmail skill.
      Calls python3 ~/.mywant/skills/list-unread-gmail/main.py.
      The skill outputs JSON; state fields with onFetchData are populated automatically.
      Completes after a single execution.
    version: '1.0'
    category: gmail
    pattern: independent

  finalResultField: summary

  achievedWhen:
    field: status
    operator: "!="
    value: "pending"

  state:
    - name: status
      description: Execution status (pending, done, failed)
      type: string
      label: current
      persistent: true
      initialValue: "pending"

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: count
      description: Number of unread important emails
      type: int
      label: current
      persistent: true
      initialValue: 0
      onFetchData: "count"

    - name: summary
      description: Summary text of unread emails
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: first_sender
      description: Sender of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      onFetchData: "emails[0].sender"

    - name: first_subject
      description: Subject of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      onFetchData: "emails[0].subject"

    - name: first_date
      description: Date of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      onFetchData: "emails[0].date"

  onInitialize:
    current:
      status: "pending"

  inlineAgents:
    - name: run_list_unread
      type: do
      runtime: shell
      script: |
        #!/bin/sh
        OUTPUT=$(python3 ~/.mywant/skills/list-unread-gmail/main.py 2>/dev/null)
        EXIT_CODE=$?

        if [ $EXIT_CODE -eq 0 ]; then
          COUNT=$(printf '%s' "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('count',0))")
          SUMMARY="${COUNT} unread important email(s)"
          ESCAPED_SUMMARY=$(printf '%s' "$SUMMARY" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          printf '{"json_data": %s, "current_updates": {"status": "done", "summary": %s}}' "$OUTPUT" "$ESCAPED_SUMMARY"
        else
          ERROR_MSG=$(printf '%s' "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('error','unknown error'))" 2>/dev/null || echo "gmail script failed")
          ESCAPED=$(printf '%s' "$ERROR_MSG" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          printf '{"current_updates": {"error": %s, "status": "failed"}}' "$ESCAPED"
        fi

  examples:
    - name: Check Unread Gmail
      description: List unread important emails
      want:
        metadata:
          name: check_gmail
          type: gmail_list_unread
