wantType:
  metadata:
    name: gmail_list_unread
    title: Gmail Unread Important
    description: |
      Fetches unread important emails from Gmail via the list-unread-gmail skill.
      Calls python3 ~/.mywant/custom-types/mywant-gmail-list-unread-plugin/main.py.
      The skill outputs JSON; state fields with fetchFrom+onFetchData are populated automatically
      by EndProgressCycle after the MRS agent writes mrs_raw_output.
      Completes after a single execution.
    version: '1.0'
    category: gmail
    pattern: independent

  finalResultField: mrs_raw_output.emails

  state:
    - name: skill_timeout_seconds
      description: Max seconds to wait for the skill script to complete (default 120)
      type: int
      label: goal
      persistent: false
      initialValue: 120

    - name: skill_path
      description: Path to the MRS skill script (set by onInitialize)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mrs_raw_output
      description: Raw JSON output from the MRS skill (source for fetchFrom fields)
      type: object
      label: current
      persistent: false
      initialValue: null

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: count
      description: Number of unread important emails
      type: int
      label: current
      persistent: true
      initialValue: 0
      fetchFrom: mrs_raw_output
      onFetchData: "count"

    - name: summary
      description: Summary text of unread emails
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: first_sender
      description: Sender of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "emails[0].sender"

    - name: first_subject
      description: Subject of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "emails[0].subject"

    - name: first_date
      description: Date of the first unread email
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "emails[0].date"

  finalizeWhen:
    achieved:
      field: mrs_raw_output
      operator: "!="
      value: null
    failed:
      field: error
      operator: "!="
      value: ""

  onInitialize:
    current:
      skill_path: "~/.mywant/custom-types/mywant-gmail-list-unread-plugin/main.py"

  requires:
    - monitor_mrs_agent

  examples:
    - name: Check Unread Gmail
      description: List unread important emails
      want:
        metadata:
          name: check_gmail
          type: gmail_list_unread
